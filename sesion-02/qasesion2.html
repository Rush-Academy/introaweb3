document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

03, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Metrophobic';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"9d9c504c-3854-437d-8e66-05532bacfa57\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Metrophobic';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"62521ead-222f-4da4-a4f2-527217324eda\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n    body {\n      background: #0c0a1e;\n      color: #e8e4ff;\n      font-family: 'Metrophobic', sans-serif;\n    }\n    @page { size: A4; margin: 0; }\n    @media print {\n      html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }\n      html, body { margin: 0; padding: 0; }\n      .doc { max-width: none !important; margin: 0 !important; box-shadow: none !important; }\n      .hdr-space, .ftr-space { display: table-cell; height: 0.6in; }\n      h1, h2, h3 { break-after: avoid; }\n      .qa-block { break-inside: avoid; }\n      .screen-only { display: none !important; }\n      *, *::before, *::after {\n        animation-delay: -99s !important;\n        animation-duration: .001s !important;\n        animation-fill-mode: both !important;\n        transition-duration: 0s !important;\n      }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<main style=\"background: #0c0a1e; min-height: 100vh; font-family: 'Metrophobic', sans-serif;\">\n  <div class=\"doc\" style=\"max-width: 820px; margin: 0 auto; padding: 0 0 80px;\">\n    <table class=\"doc-frame\" role=\"presentation\" style=\"width: 100%; border-collapse: collapse;\">\n      <thead><tr><td class=\"hdr-space\" style=\"display: none;\"><\u002Ftd><\u002Ftr><\u002Fthead>\n      <tbody><tr><td style=\"padding: 0;\">\n\n        <!-- HEADER -->\n        <div style=\"background: linear-gradient(30deg, #372887 0%, #6959fb 100%); padding: 44px 48px 44px; position: relative; overflow: hidden;\">\n          <!-- decorative circles -->\n          <div style=\"position: absolute; top: -60px; right: -60px; width: 240px; height: 240px; border-radius: 50%; background: rgba(255,255,255,0.04); pointer-events: none;\"><\u002Fdiv>\n          <div style=\"position: absolute; bottom: -40px; left: 30%; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.03); pointer-events: none;\"><\u002Fdiv>\n\n          <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap;\">\n            <!-- Left: title block -->\n            <div style=\"flex: 1; min-width: 260px;\">\n              <div style=\"font-family: 'Heebo', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.65); margin-bottom: 18px;\">Introducción a Web3<\u002Fdiv>\n              <h1 style=\"font-family: 'Heebo', sans-serif; font-size: 38px; font-weight: 800; line-height: 1.15; color: #ffffff; text-wrap: balance; margin-bottom: 10px;\">\n                Respuestas a Consultas\n              <\u002Fh1>\n              <div style=\"font-family: 'Heebo', sans-serif; font-size: 18px; font-weight: 300; color: rgba(255,255,255,0.82); letter-spacing: 0.3px;\">\n                Sesión 2 — Tokenización y Economía Digital\n              <\u002Fdiv>\n              <div style=\"margin-top: 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;\">\n                <div style=\"background: rgba(255,255,255,0.12); border-radius: 4px; padding: 5px 13px; font-family: 'Metrophobic', sans-serif; font-size: 13px; color: rgba(255,255,255,0.85);\">6 consultas respondidas<\u002Fdiv>\n                <div style=\"background: rgba(255,255,255,0.12); border-radius: 4px; padding: 5px 13px; font-family: 'Metrophobic', sans-serif; font-size: 13px; color: rgba(255,255,255,0.85);\">Junio 2026<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <!-- Right: logo -->\n            <div style=\"flex-shrink: 0;\">\n              <img src=\"f811dabe-055b-4c44-9fbc-fb278fd3836a\" alt=\"Rush Academy\" style=\"width: 160px; height: 116px; object-fit: contain; display: block;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- BODY -->\n        <div style=\"padding: 48px 48px 0;\">\n\n          <!-- Q1 -->\n          <div class=\"qa-block\" style=\"margin-bottom: 32px; background: #13103a; border-radius: 10px; overflow: hidden; border: 1px solid rgba(105,89,251,0.2);\">\n            <div style=\"background: linear-gradient(30deg, #372887, #6959fb); padding: 16px 24px; display: flex; align-items: center; gap: 14px;\">\n              <div style=\"font-family: 'Heebo', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2.5px; color: rgba(255,255,255,0.6); text-transform: uppercase;\">Pregunta<\u002Fdiv>\n              <div style=\"width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0;\">1<\u002Fdiv>\n              <h2 style=\"font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 600; color: #ffffff; line-height: 1.4;\">¿Puede haber fraude con cualquier tipo de token?<\u002Fh2>\n            <\u002Fdiv>\n            <div style=\"padding: 24px 28px;\">\n              <p style=\"font-size: 15px; line-height: 1.72; color: #c8c0f0; text-wrap: pretty;\">Sí, puede haberlo — pero no desde adentro del sistema, sino desde afuera. El blockchain en sí es prácticamente imposible de hackear. El fraude ocurre en los bordes: alguien puede crear un token que promete representar algo que no existe, como una propiedad que no es suya, o un proyecto que nunca va a construir. El token es legítimo técnicamente, pero lo que representa detrás es falso.<\u002Fp>\n              <div style=\"margin-top: 16px; padding: 14px 18px; background: rgba(105,89,251,0.1); border-left: 3px solid #6959fb; border-radius: 0 6px 6px 0;\">\n                <p style=\"font-size: 14px; line-height: 1.65; color: #a89ff5; font-style: italic;\">Es como falsificar una escritura — el papel puede verse real pero el activo no existe. Por eso siempre hay que preguntarse: ¿qué hay detrás del token?<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Q2 -->\n          <div class=\"qa-block\" style=\"margin-bottom: 32px; background: #13103a; border-radius: 10px; overflow: hidden; border: 1px solid rgba(105,89,251,0.2);\">\n            <div style=\"background: linear-gradient(30deg, #372887, #6959fb); padding: 16px 24px; display: flex; align-items: center; gap: 14px;\">\n              <div style=\"font-family: 'Heebo', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2.5px; color: rgba(255,255,255,0.6); text-transform: uppercase;\">Pregunta<\u002Fdiv>\n              <div style=\"width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0;\">2<\u002Fdiv>\n              <h2 style=\"font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 600; color: #ffffff; line-height: 1.4;\">¿Un token es igual a todo el certificado o son varios tokens?<\u002Fh2>\n            <\u002Fdiv>\n            <div style=\"padding: 24px 28px;\">\n              <p style=\"font-size: 15px; line-height: 1.72; color: #c8c0f0; text-wrap: pretty;\">Un solo token representa todo el certificado completo. Lo que se almacena en blockchain no es el documento en sí — es una huella digital única de ese documento, llamada hash. Si el documento cambia aunque sea una coma, el hash cambia completamente. Entonces el token apunta a esa huella y garantiza que el certificado es auténtico e inalterado.<\u002Fp>\n              <div style=\"margin-top: 16px; padding: 14px 18px; background: rgba(105,89,251,0.1); border-left: 3px solid #6959fb; border-radius: 0 6px 6px 0;\">\n                <p style=\"font-size: 14px; line-height: 1.65; color: #a89ff5; font-style: italic;\">Un certificado, un token, una identidad única.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Q3 -->\n          <div class=\"qa-block\" style=\"margin-bottom: 32px; background: #13103a; border-radius: 10px; overflow: hidden; border: 1px solid rgba(105,89,251,0.2);\">\n            <div style=\"background: linear-gradient(30deg, #372887, #6959fb); padding: 16px 24px; display: flex; align-items: center; gap: 14px;\">\n              <div style=\"font-family: 'Heebo', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2.5px; color: rgba(255,255,255,0.6); text-transform: uppercase;\">Pregunta<\u002Fdiv>\n              <div style=\"width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0;\">3<\u002Fdiv>\n              <h2 style=\"font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 600; color: #ffffff; line-height: 1.4;\">¿Existe alguna vulnerabilidad al tokenizar un activo?<\u002Fh2>\n            <\u002Fdiv>\n            <div style=\"padding: 24px 28px;\">\n              <p style=\"font-size: 15px; line-height: 1.72; color: #c8c0f0; text-wrap: pretty;\">La blockchain en sí es muy segura, pero hay tres puntos vulnerables:<\u002Fp>\n              <div style=\"margin-top: 16px; display: flex; flex-direction: column; gap: 10px;\">\n                <div style=\"display: flex; gap: 14px; align-items: flex-start; padding: 12px 16px; background: rgba(55,40,135,0.35); border-radius: 6px;\">\n                  <div style=\"width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(30deg,#372887,#6959fb); display: flex; align-items: center; justify-content: center; font-family: 'Heebo',sans-serif; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; margin-top: 1px;\">1<\u002Fdiv>\n                  <p style=\"font-size: 14px; line-height: 1.65; color: #c8c0f0;\"><strong style=\"color: #e8e4ff;\">La información que entra<\u002Fstrong> — si los datos del activo son incorrectos desde el inicio, el token los va a registrar mal. Basura que entra, basura que sale.<\u002Fp>\n                <\u002Fdiv>\n                <div style=\"display: flex; gap: 14px; align-items: flex-start; padding: 12px 16px; background: rgba(55,40,135,0.35); border-radius: 6px;\">\n                  <div style=\"width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(30deg,#372887,#6959fb); display: flex; align-items: center; justify-content: center; font-family: 'Heebo',sans-serif; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; margin-top: 1px;\">2<\u002Fdiv>\n                  <p style=\"font-size: 14px; line-height: 1.65; color: #c8c0f0;\"><strong style=\"color: #e8e4ff;\">Los smart contracts<\u002Fstrong> — los programas que gestionan los tokens pueden tener errores de programación que alguien puede explotar.<\u002Fp>\n                <\u002Fdiv>\n                <div style=\"display: flex; gap: 14px; align-items: flex-start; padding: 12px 16px; background: rgba(55,40,135,0.35); border-radius: 6px;\">\n                  <div style=\"width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(30deg,#372887,#6959fb); display: flex; align-items: center; justify-content: center; font-family: 'Heebo',sans-serif; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; margin-top: 1px;\">3<\u002Fdiv>\n                  <p style=\"font-size: 14px; line-height: 1.65; color: #c8c0f0;\"><strong style=\"color: #e8e4ff;\">Las personas<\u002Fstrong> — las contraseñas y llaves privadas que dan acceso a los tokens pueden robarse si no se protegen bien.<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-top: 16px; padding: 14px 18px; background: rgba(105,89,251,0.1); border-left: 3px solid #6959fb; border-radius: 0 6px 6px 0;\">\n                <p style=\"font-size: 14px; line-height: 1.65; color: #a89ff5; font-style: italic;\">La cadena es tan fuerte como su eslabón más débil.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Q4 -->\n          <div class=\"qa-block\" style=\"margin-bottom: 32px; background: #13103a; border-radius: 10px; overflow: hidden; border: 1px solid rgba(105,89,251,0.2);\">\n            <div style=\"background: linear-gradient(30deg, #372887, #6959fb); padding: 16px 24px; display: flex; align-items: center; gap: 14px;\">\n              <div style=\"font-family: 'Heebo', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2.5px; color: rgba(255,255,255,0.6); text-transform: uppercase;\">Pregunta<\u002Fdiv>\n              <div style=\"width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0;\">4<\u002Fdiv>\n              <h2 style=\"font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 600; color: #ffffff; line-height: 1.4;\">¿Cómo funciona fraccionar un activo en tokens pequeños?<\u002Fh2>\n            <\u002Fdiv>\n            <div style=\"padding: 24px 28px;\">\n              <p style=\"font-size: 15px; line-height: 1.72; color: #c8c0f0; text-wrap: pretty;\">Es uno de los casos de uso más interesantes de la tokenización. Imaginen una propiedad que vale $100,000. Normalmente solo quien tiene $100,000 puede comprarla. Pero si esa propiedad se tokeniza y se divide en 100,000 tokens de $1 cada uno — de repente cualquier persona puede comprar una fracción de esa propiedad con lo que tenga disponible.<\u002Fp>\n              <div style=\"margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap;\">\n                <div style=\"flex: 1; min-width: 180px; padding: 16px; background: rgba(55,40,135,0.45); border-radius: 8px; text-align: center;\">\n                  <div style=\"font-family: 'Heebo', sans-serif; font-size: 28px; font-weight: 800; color: #6959fb; line-height: 1;\">$100,000<\u002Fdiv>\n                  <div style=\"font-size: 12px; color: #a89ff5; margin-top: 6px;\">Valor del activo<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display: flex; align-items: center; font-family: 'Heebo', sans-serif; font-size: 22px; color: #6959fb; font-weight: 300;\">÷<\u002Fdiv>\n                <div style=\"flex: 1; min-width: 180px; padding: 16px; background: rgba(55,40,135,0.45); border-radius: 8px; text-align: center;\">\n                  <div style=\"font-family: 'Heebo', sans-serif; font-size: 28px; font-weight: 800; color: #6959fb; line-height: 1;\">100,000<\u002Fdiv>\n                  <div style=\"font-size: 12px; color: #a89ff5; margin-top: 6px;\">Tokens emitidos<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display: flex; align-items: center; font-family: 'Heebo', sans-serif; font-size: 22px; color: #6959fb; font-weight: 300;\">=<\u002Fdiv>\n                <div style=\"flex: 1; min-width: 180px; padding: 16px; background: linear-gradient(30deg, rgba(55,40,135,0.7), rgba(105,89,251,0.4)); border-radius: 8px; text-align: center; border: 1px solid rgba(105,89,251,0.4);\">\n                  <div style=\"font-family: 'Heebo', sans-serif; font-size: 28px; font-weight: 800; color: #ffffff; line-height: 1;\">$1<\u002Fdiv>\n                  <div style=\"font-size: 12px; color: #c8c0f0; margin-top: 6px;\">por token<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"margin-top: 16px; padding: 14px 18px; background: rgba(105,89,251,0.1); border-left: 3px solid #6959fb; border-radius: 0 6px 6px 0;\">\n                <p style=\"font-size: 14px; line-height: 1.65; color: #a89ff5; font-style: italic;\">Es exactamente como comprar acciones de una empresa, pero aplicado a activos físicos como bienes raíces, obras de arte o cualquier activo de alto valor.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Q5 -->\n          <div class=\"qa-block\" style=\"margin-bottom: 32px; background: #13103a; border-radius: 10px; overflow: hidden; border: 1px solid rgba(105,89,251,0.2);\">\n            <div style=\"background: linear-gradient(30deg, #372887, #6959fb); padding: 16px 24px; display: flex; align-items: center; gap: 14px;\">\n              <div style=\"font-family: 'Heebo', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2.5px; color: rgba(255,255,255,0.6); text-transform: uppercase;\">Pregunta<\u002Fdiv>\n              <div style=\"width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0;\">5<\u002Fdiv>\n              <h2 style=\"font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 600; color: #ffffff; line-height: 1.4;\">¿Google Authenticator es un token no fungible? ¿Y un acceso pagado?<\u002Fh2>\n            <\u002Fdiv>\n            <div style=\"padding: 24px 28px;\">\n              <p style=\"font-size: 15px; line-height: 1.72; color: #c8c0f0; text-wrap: pretty; margin-bottom: 14px;\">Google Authenticator genera códigos temporales de verificación — técnicamente son tokens de seguridad, pero no viven en blockchain, no tienen identidad única permanente y expiran en segundos. No son NFTs en el sentido Web3 del término.<\u002Fp>\n              <p style=\"font-size: 15px; line-height: 1.72; color: #c8c0f0; text-wrap: pretty;\">Sobre la segunda pregunta — es un razonamiento muy inteligente y va por buen camino. Si el acceso está asociado a un usuario específico que pagó, tiene características únicas que lo identifican, y no es intercambiable con el acceso de otra persona — sí, estaría más cerca de un token no fungible.<\u002Fp>\n              <div style=\"margin-top: 16px; padding: 14px 18px; background: rgba(105,89,251,0.1); border-left: 3px solid #6959fb; border-radius: 0 6px 6px 0;\">\n                <p style=\"font-size: 14px; line-height: 1.65; color: #a89ff5; font-style: italic;\">La diferencia clave está en si ese acceso tiene identidad única o si cualquier acceso vale igual que otro.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Q6 -->\n          <div class=\"qa-block\" style=\"margin-bottom: 0; background: #13103a; border-radius: 10px; overflow: hidden; border: 1px solid rgba(105,89,251,0.2);\">\n            <div style=\"background: linear-gradient(30deg, #372887, #6959fb); padding: 16px 24px; display: flex; align-items: center; gap: 14px;\">\n              <div style=\"font-family: 'Heebo', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2.5px; color: rgba(255,255,255,0.6); text-transform: uppercase;\">Pregunta<\u002Fdiv>\n              <div style=\"width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0;\">6<\u002Fdiv>\n              <h2 style=\"font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 600; color: #ffffff; line-height: 1.4;\">¿En blockchain nada existe si no es a través de tokens?<\u002Fh2>\n            <\u002Fdiv>\n            <div style=\"padding: 24px 28px;\">\n              <p style=\"font-size: 15px; line-height: 1.72; color: #c8c0f0; text-wrap: pretty; margin-bottom: 14px;\">No exactamente. En blockchain pueden existir registros de información que no son tokens — transacciones, contratos, datos. Pero sí es cierto que los tokens son el mecanismo principal para representar valor dentro de blockchain.<\u002Fp>\n              <div style=\"display: flex; gap: 16px; margin-top: 16px; flex-wrap: wrap;\">\n                <div style=\"flex: 1; min-width: 200px; padding: 18px; background: rgba(55,40,135,0.35); border-radius: 8px;\">\n                  <div style=\"font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #6959fb; margin-bottom: 8px;\">Blockchain<\u002Fdiv>\n                  <p style=\"font-size: 13px; line-height: 1.6; color: #a89ff5;\">La infraestructura — la carretera.<\u002Fp>\n                <\u002Fdiv>\n                <div style=\"flex: 1; min-width: 200px; padding: 18px; background: rgba(55,40,135,0.35); border-radius: 8px;\">\n                  <div style=\"font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #6959fb; margin-bottom: 8px;\">Tokens<\u002Fdiv>\n                  <p style=\"font-size: 13px; line-height: 1.6; color: #a89ff5;\">Los vehículos que circulan por ella y le dan utilidad práctica al sistema.<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n\n        <!-- FOOTER -->\n        <div style=\"margin: 48px 48px 0; padding: 28px 32px; background: linear-gradient(30deg, #372887 0%, #6959fb 100%); border-radius: 10px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;\">\n          <div style=\"display: flex; align-items: center; gap: 14px;\">\n            <img src=\"f811dabe-055b-4c44-9fbc-fb278fd3836a\" alt=\"Rush Academy\" style=\"width: 64px; height: 46px; object-fit: contain; display: block; flex-shrink: 0;\">\n            <div>\n              <div style=\"font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 700; color: #ffffff; letter-spacing: 0.5px;\">Rush Academy<\u002Fdiv>\n              <div style=\"font-family: 'Metrophobic', sans-serif; font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 3px;\">Introducción a Web3 · Sesión 2<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-family: 'Metrophobic', sans-serif; font-size: 12px; color: rgba(255,255,255,0.55); text-align: right; line-height: 1.6;\">\n            Tokenización y Economía Digital<br>Documento para uso interno del curso\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Ftd><\u002Ftr><\u002Ftbody>\n      <tfoot><tr><td class=\"ftr-space\" style=\"display: none;\"><\u002Ftd><\u002Ftr><\u002Ftfoot>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fmain>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
